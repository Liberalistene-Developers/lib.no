version: 2
updates:
  - package-ecosystem: 'gradle'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    assignees:
      - 'VirtueMe'
    reviewers:
      - 'VirtueMe'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    assignees:
      - 'VirtueMe'
    reviewers:
      - 'VirtueMe'
    # Packages managed manually during major upgrades
    ignore:
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-leaflet'
    groups:
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      eslint:
        patterns:
          - 'eslint'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'eslint-plugin-*'
      enonic:
        patterns:
          - '@enonic/*'
          - '@enonic-types/*'
          - '@item-enonic-types/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    assignees:
      - 'VirtueMe'
    reviewers:
      - 'VirtueMe'
