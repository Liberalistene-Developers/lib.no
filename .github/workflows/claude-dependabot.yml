name: Claude Dependabot Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude-dependabot-review:
    runs-on: ubuntu-latest
    # Only run on Dependabot PRs
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Claude Review Dependabot PR
        uses: anthropics/claude-code-action@v1.0.66
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: >-
            --model ${{ vars.ANTHROPIC_DEFAULT_MODEL || 'claude-sonnet-4-6-default' }}
            --max-turns 5
            --allowedTools "Read,Grep,Glob,Bash(gh:*),Bash(git:*),Bash(jq:*)"
          prompt: |
            Review this Dependabot dependency update PR:

            1. Check the changelog and release notes for breaking changes
            2. Identify any security fixes included
            3. Assess compatibility with our project (Node 22.15.1, Java 17, React 18, TypeScript 5)
            4. Look for any deprecations or migration steps needed
            5. Recommend whether to approve, hold for testing, or reject

            Provide a concise summary with:
            - Risk level (Low/Medium/High)
            - Key changes
            - Action recommendation

      - name: Dump claude debug info
        if: failure() && vars.CLAUDE_DEBUG == 'true'
        run: |
          echo "=== ~/.claude/ ==="
          find ~/.claude/ -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done || echo "No ~/.claude dir"
          echo "=== project .claude/ ==="
          find .claude/ -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done || echo "No project .claude dir"
