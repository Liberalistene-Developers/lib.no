name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1.0.66
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: >-
            --model ${{ vars.ANTHROPIC_DEFAULT_MODEL || 'claude-sonnet-4-6-default' }}
            --max-turns 5
            --allowedTools "Read,Grep,Glob,Bash(gh:*),Bash(git:*),Bash(jq:*)"

      - name: Dump claude debug info
        if: failure() && vars.CLAUDE_DEBUG == 'true'
        run: |
          echo "=== ~/.claude/ ==="
          find ~/.claude/ -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done || echo "No ~/.claude dir"
          echo "=== project .claude/ ==="
          find .claude/ -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done || echo "No project .claude dir"
